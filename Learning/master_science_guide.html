{ id:'hydraulic', cat:'mechanical', icon:'💧', title:"Hydraulic Pressure — Pascal's Law", sub:"How small forces become massive forces in hydraulic systems",
  body:`
<h3>Pascal's Law</h3>
<p>Blaise Pascal (1623–1662) discovered: <b>pressure applied to any point of a confined, incompressible fluid is transmitted equally and without reduction to all other points in the fluid</b> and to the walls of the container. This is the basis of all hydraulic machinery.</p>
<div class="formula">Pressure: P = F/A  (Force per unit Area, Pascals = N/m²)
Pascal's Law: P₁ = P₂  (same pressure throughout fluid)
Therefore: F₁/A₁ = F₂/A₂
Force multiplication: F₂ = F₁ × (A₂/A₁)
Volume conservation: d₁ × A₁ = d₂ × A₂
(Large piston moves proportionally LESS distance)</div>
<h3>Numerical Example</h3>
<p>Small piston: A₁ = 1 cm² = 0.0001 m². Large piston: A₂ = 100 cm² = 0.01 m². Apply force F₁ = 100 N:</p>
<div class="formula">P = F₁/A₁ = 100 / 0.0001 = 1,000,000 Pa = 1 MPa
F₂ = P × A₂ = 1,000,000 × 0.01 = 10,000 N (10 kN!)
Mechanical Advantage = F₂/F₁ = A₂/A₁ = 100×
BUT: Small piston must move 100× farther than large piston
(Energy conservation — no free lunch!)</div>
<h3>Real-World Applications</h3>
<table class="data-table">
<tr><th>Application</th><th>Working</th><th>Force Multiplication</th></tr>
<tr><td><b>Car Brake System</b></td><td>Foot force → brake master cylinder → fluid → brake calipers at 4 wheels simultaneously</td><td>10–20×</td></tr>
<tr><td><b>JCB/Excavator</b></td><td>Joystick controls hydraulic valve → hydraulic cylinder extends → bucket digs or lifts</td><td>Lift 10+ tonnes</td></tr>
<tr><td><b>Aircraft Flight Controls</b></td><td>Pilot input → hydraulic actuators → control surfaces (flaps, rudder, ailerons)</td><td>Precise large-force control</td></tr>
<tr><td><b>Hydraulic Press</b></td><td>Electric pump → high-pressure fluid → large ram</td><td>Metal forming, forging, scrap crushing</td></tr>
<tr><td><b>Car Power Steering</b></td><td>Engine-driven pump → hydraulic assist on steering rack</td><td>Easy turning at low speed</td></tr>
<tr><td><b>Dump Truck</b></td><td>Hydraulic ram under truck bed tilts to unload</td><td>Lifts several tonnes of material</td></tr>
<tr><td><b>Car Jack</b></td><td>Hand pump → lifting piston via Pascal's Law</td><td>Lift 2-tonne car with one hand</td></tr>
<tr><td><b>Hydraulic Brakes (Bicycle)</b></td><td>Lever → master cylinder → caliper pistons clamp disc</td><td>Consistent modulated braking</td></tr>
</table>`
},

{ id:'engine', cat:'mechanical', icon:'🔧', title:"IC Engine — RPM, BHP & Torque Explained", sub:"How car engines convert fuel into motion",
  body:`
<h3>The 4-Stroke Otto Cycle (Petrol Engine)</h3>
<table class="data-table">
<tr><th>Stroke</th><th>Piston</th><th>Valves</th><th>What Happens</th></tr>
<tr><td><b>1. Intake</b></td><td>Moves DOWN</td><td>Inlet OPEN, Exhaust CLOSED</td><td>Air-fuel mixture (petrol + air) drawn into cylinder</td></tr>
<tr><td><b>2. Compression</b></td><td>Moves UP</td><td>Both CLOSED</td><td>Mixture compressed ~10:1 → temperature rises to ~400°C</td></tr>
<tr><td><b>3. Power (Combustion)</b></td><td>Pushed DOWN</td><td>Both CLOSED</td><td>Spark plug fires → explosion → ~2500°C → piston pushed down → THIS IS WHERE ALL POWER COMES FROM</td></tr>
<tr><td><b>4. Exhaust</b></td><td>Moves UP</td><td>Exhaust OPEN</td><td>Burnt gases (CO₂, H₂O, NOx) pushed out of cylinder</td></tr>
</table>
<h3>Key Engine Terms</h3>
<h4>RPM (Revolutions Per Minute)</h4>
<p>Measures how many times the crankshaft completes a full revolution per minute. In a 4-stroke engine at 3000 RPM, each piston fires 1500 times per minute.</p>
<h4>BHP (Brake Horsepower)</h4>
<p>Actual power output measured at the crankshaft using a dynamometer (brake). Accounts for all friction losses inside the engine. 1 BHP = 745.7 Watts.</p>
<h4>Torque</h4>
<p>The rotational force — how much "twisting" power the engine produces. Determines ACCELERATION and PULLING POWER. Diesel = high torque at low RPM (trucks). Petrol = high power at high RPM (sports cars).</p>
<div class="formula">Power (kW) = Torque (Nm) × RPM / 9549
Power (HP) = Torque (lb-ft) × RPM / 5252
BHP ≈ Power HP × mechanical efficiency
1 HP = 745.7 W,  1 kW = 1.341 HP
Engine displacement (cc) = Volume swept by all pistons per cycle</div>
<h3>Diesel vs Petrol Comparison</h3>
<table class="data-table">
<tr><th>Parameter</th><th>Petrol (Spark Ignition)</th><th>Diesel (Compression Ignition)</th></tr>
<tr><td>Ignition</td><td>Spark plug</td><td>High compression (~20:1) heats air to ignite diesel</td></tr>
<tr><td>Compression ratio</td><td>8:1 to 12:1</td><td>14:1 to 25:1</td></tr>
<tr><td>Fuel efficiency</td><td>~12–16 km/L</td><td>~15–22 km/L (more energy per litre)</td></tr>
<tr><td>Torque characteristic</td><td>Lower torque, higher RPM</td><td>High torque at low RPM (1500–2500 rpm)</td></tr>
<tr><td>Power delivery</td><td>Smooth, high-revving</td><td>Strong low-end, limited high RPM</td></tr>
<tr><td>Main emissions</td><td>CO, unburnt HC</td><td>NOx, PM (particulates/soot)</td></tr>
<tr><td>Applications</td><td>Cars, motorcycles, aircraft</td><td>Trucks, buses, ships, tractors, generators</td></tr>
</table>
<div class="note"><strong>Why does diesel have better fuel economy?</strong> Diesel has ~15% more energy per litre than petrol, AND diesel engines have higher compression ratios → more thermodynamic efficiency (Carnot efficiency improves with temperature ratio). A modern diesel car can be 30–40% more fuel-efficient than its petrol equivalent.</div>`
},

{ id:'surface_tension', cat:'mechanical', icon:'💧', title:"Surface Tension & Capillary Action", sub:"Why water forms droplets and rises in thin tubes",
  body:`
<h3>What is Surface Tension?</h3>
<p>Surface tension is the elastic tendency of liquid surfaces to minimize their area. It arises because molecules at the surface have fewer neighbors to bond with (only sideways and downward, not above), creating a net <b>inward force</b> on surface molecules. This creates a "skin-like" layer at the liquid surface.</p>
<div class="formula">γ = F/L  (surface tension = force per unit length, N/m)
OR: γ = dW/dA  (energy per unit area, J/m²)
Water at 20°C: γ = 0.0728 N/m  (unusually high due to H-bonds)
Mercury at 20°C: γ = 0.487 N/m  (highest common liquid)
Ethanol: γ = 0.022 N/m
Soap solution: γ ≈ 0.025–0.040 N/m</div>
<h3>Why Water Has Unusually High Surface Tension</h3>
<p>Water molecules form <b>hydrogen bonds</b> (O–H···O). Each water molecule can form up to 4 hydrogen bonds. At the surface, fewer neighbors means more unsatisfied bonds — creating a strong inward pull. This gives water one of the highest surface tensions of any common liquid at room temperature.</p>
<h3>Manifestations of Surface Tension</h3>
<ul>
<li><b>Water strider insects:</b> Their weight is supported by surface tension deforming (not breaking) the water surface. Hydrophobic legs spread the load.</li>
<li><b>Needle floating on water:</b> A steel needle (density 7.9 g/cm³, much denser than water) placed carefully lies in a slight surface depression — supported by surface tension, not buoyancy.</li>
<li><b>Spherical droplets:</b> Surface tension minimizes surface area → most compact shape = sphere (minimum area for given volume).</li>
<li><b>Soap bubbles:</b> Two soap-water interfaces enclosing air. Surface tension minimizes both interfaces → spherical bubble. Soap reduces γ from 0.073 to ~0.030 N/m.</li>
<li><b>Detergents cleaning:</b> Surfactant molecules (detergent) have hydrophilic head and hydrophobic tail. They align at water-oil interfaces, drastically reducing surface tension → water can wet surfaces and lift grease.</li>
</ul>
<h3>Capillary Action</h3>
<p>In narrow tubes, adhesion (liquid-wall attraction) and surface tension can pull liquid <b>against gravity</b>. Water "wets" glass (contact angle &lt;90°), so water climbs glass capillaries. Mercury doesn't wet glass (contact angle &gt;90°), so mercury is depressed in glass capillaries.</p>
<div class="formula">Height of capillary rise: h = 2γ cos(θ) / (ρgr)
γ = surface tension (N/m)
θ = contact angle between liquid and wall
ρ = liquid density (kg/m³), g = 9.81 m/s², r = tube radius (m)
For water in glass (θ≈0°): h = 2×0.073/(1000×9.81×r) = 14.9/r mm
(r in mm → h in mm; tiny r = large h)</div>
<p><b>Biological importance:</b> Capillary action helps trees transport water from roots to leaves — even 100-meter-tall redwood trees. Also how blood moves through your 8-10 billion capillaries, and how paper towels absorb water.</p>`
},

// ════ MODERN SCIENCE ════
{ id:'atombomb', cat:'modern', icon:'☢️', title:"Atom Bomb — Nuclear Fission Physics", sub:"The physics of nuclear chain reactions and atomic weapons",
  body:`
<h3>Nuclear Fission — The Core Reaction</h3>
<p>Nuclear fission is the splitting of a heavy nucleus when struck by a neutron. The total mass of products is slightly LESS than the original — this <b>mass defect</b> converts to energy via E=mc². Even tiny mass differences produce enormous energy.</p>
<div class="formula">²³⁵₉₂U + ¹₀n  →  ⁹²₃₆Kr + ¹⁴¹₅₆Ba + 3¹₀n + ~200 MeV
Energy per fission: ~200 MeV = 3.2 × 10⁻¹¹ J
1 kg U-235 complete fission: ~8.2 × 10¹³ J = 82 terajoules
≡ ~20,000 tonnes of TNT (20 kilotons)
Mass defect: ~0.001 atomic mass unit per fission
0.001 u = 1.66 × 10⁻³⁰ kg → E = mc² = 1.49 × 10⁻¹³ J</div>
<h3>The Chain Reaction</h3>
<p>Each fission releases 2–3 neutrons. These trigger more fissions → exponential growth. In 80 generations: 2⁸⁰ ≈ 10²⁴ fissions. The time between fission generations: ~10 nanoseconds. So 80 generations happen in ~800 nanoseconds = less than 1 microsecond. This is why nuclear explosions are so instantaneous and violent.</p>
<h3>Critical Mass</h3>
<p>For a self-sustaining chain reaction, a minimum amount of fissile material is needed. Below critical mass, too many neutrons escape without hitting nuclei. Critical mass depends on geometry, enrichment level, and use of a reflector (surrounds the material, bounces neutrons back).</p>
<table class="data-table">
<tr><th>Material</th><th>Bare Critical Mass</th><th>With Reflector</th><th>Notes</th></tr>
<tr><td>Uranium-235</td><td>~52 kg</td><td>~15 kg</td><td>Requires ~90%+ enrichment (natural U is 0.7% U-235)</td></tr>
<tr><td>Plutonium-239</td><td>~10 kg</td><td>~4 kg</td><td>Produced in nuclear reactors from U-238</td></tr>
</table>
<h3>The Two Bomb Designs</h3>
<h4>Gun-Type Design (Little Boy — Hiroshima, Aug 6 1945)</h4>
<p>One subcritical U-235 mass fired into another using a gun barrel. Simple but wasteful — only ~1.4% of 64 kg of U-235 actually fissioned. Yield: 15 kilotons. Killed ~70,000–80,000 people instantly.</p>
<h4>Implosion Design (Fat Man — Nagasaki, Aug 9 1945)</h4>
<p>A spherical subcritical Pu-239 core surrounded by precisely shaped conventional explosive "lenses." Synchronized detonation creates an inward shockwave that uniformly compresses the core to supercriticality. Far more efficient: 21 kiloton yield from ~6 kg Pu-239. Used in all modern nuclear weapons.</p>
<h3>Thermonuclear (Hydrogen) Bomb</h3>
<p>A fission bomb provides the extreme temperature (~100 million °C) and pressure needed to initiate nuclear <b>fusion</b> of deuterium (²H) and tritium (³H). Fusion releases 3–4× more energy per unit mass than fission. The Soviet <b>Tsar Bomba</b> (1961): 50 megaton yield — ~3,000× the Hiroshima bomb. The largest explosion in human history.</p>
<h3>Nuclear Power Plants</h3>
<p>Use a controlled fission chain reaction (k = 1, not &gt;1) to produce heat → steam → turbine → electricity. Control rods (boron, cadmium) absorb neutrons to regulate reaction rate. India operates 22 nuclear reactors (7,480 MW), with 8 more under construction.</p>`
},

{ id:'quantum', cat:'modern', icon:'⚛️', title:"Quantum Theory & Quantum Computing", sub:"The strange world of superposition, entanglement and qubits",
  body:`
<h3>The Five Core Principles of Quantum Mechanics</h3>
<ol>
<li><b>Wave-Particle Duality:</b> Light (and all matter) behaves as both a wave AND a particle depending on the experiment. In the double-slit experiment, a SINGLE electron passes through BOTH slits simultaneously (wave) and creates an interference pattern, yet lands as a definite point (particle). Observing which slit it went through destroys the interference pattern — the act of measurement changes reality.</li>
<li><b>Heisenberg's Uncertainty Principle:</b> You CANNOT simultaneously know both position AND momentum with arbitrary precision. This is not a measurement limitation — it's a fundamental property of nature, built into the mathematics of waves.
<div class="formula">ΔxΔp ≥ ℏ/2  (position × momentum uncertainty)
ΔEΔt ≥ ℏ/2  (energy × time uncertainty)
ℏ = h/(2π) = 1.055 × 10⁻³⁴ J·s (reduced Planck constant)</div></li>
<li><b>Superposition:</b> A quantum system exists in a COMBINATION of multiple states simultaneously until measured. The wavefunction ψ encodes probabilities of each outcome. Measurement "collapses" the wavefunction to a definite state. Schrödinger's cat: simultaneously alive AND dead until the box is opened.</li>
<li><b>Quantum Tunneling:</b> A particle can pass through an energy barrier it classically cannot cross — like a ball rolling through a hill rather than over it. Probability decreases exponentially with barrier thickness. Used in: nuclear fusion in stars (allows protons to fuse at lower temperatures than classically needed), tunnel diodes, scanning tunneling microscopes, flash memory storage.</li>
<li><b>Quantum Entanglement:</b> Two particles can be prepared in an entangled state such that measuring one INSTANTLY determines the other's state, regardless of distance. Einstein called this "spooky action at a distance" and believed it showed QM was incomplete. Bell's theorem (1964) and Aspect's experiments (1982, Nobel Prize 2022) proved entanglement is real. Cannot be used for faster-than-light communication (no information is transmitted).</li>
</ol>
<h3>Quantum Computing</h3>
<h4>Classical vs Quantum Bits</h4>
<table class="data-table">
<tr><th>Aspect</th><th>Classical Computer</th><th>Quantum Computer</th></tr>
<tr><td>Basic unit</td><td>Bit: 0 OR 1</td><td>Qubit: 0 AND 1 simultaneously (superposition)</td></tr>
<tr><td>n-bit states</td><td>2ⁿ possible states, 1 at a time</td><td>2ⁿ states ALL AT ONCE</td></tr>
<tr><td>n=10</td><td>1 state out of 1,024</td><td>All 1,024 states simultaneously</td></tr>
<tr><td>n=300</td><td>1 state out of 2³⁰⁰</td><td>More states than atoms in observable universe</td></tr>
<tr><td>Error rate</td><td>Extremely low (billions of operations error-free)</td><td>High — "noisy qubits" need error correction</td></tr>
</table>
<h4>Key Quantum Algorithms</h4>
<ul>
<li><b>Shor's Algorithm:</b> Factors large numbers exponentially faster than classical computers. A 2048-bit RSA encryption key that would take classical computers billions of years → factored in hours by a large fault-tolerant quantum computer. <em>Would break most internet encryption.</em></li>
<li><b>Grover's Algorithm:</b> Searches an unsorted N-item database in √N steps (vs N/2 classical). Quadratic speedup. Useful for optimization problems.</li>
<li><b>Quantum Simulation:</b> Simulates molecular quantum states directly. Revolutionary for drug discovery (simulating protein folding), materials science (superconductors), and fertilizer chemistry (nitrogen fixation).</li>
</ul>
<h4>Current State of Quantum Computing</h4>
<p>IBM (1000+ qubits), Google (Willow: 105 qubits, claimed 10⁵× speedup on specific task), IonQ (trapped ion qubits). All current systems are "NISQ" (Noisy Intermediate-Scale Quantum) — too noisy for practical Shor's algorithm. Fault-tolerant quantum computers: estimated 10–20 years away.</p>`
},

{ id:'parliament', cat:'india', icon:'🏛️', title:"Indian Parliament — Structure & Functioning", sub:"How India's world's-largest-democracy legislature works",
  body:`
<h3>India's Democratic Structure</h3>
<p>India is the world's largest democracy, governed by the Constitution of India (adopted January 26, 1950 — Republic Day). The Constitution is the supreme law of the land. Central legislature: <b>Parliament (Sansad)</b>, sitting in the Parliament Building, New Delhi.</p>
<h3>Structure of Parliament</h3>
<table class="data-table">
<tr><th>House</th><th>Name</th><th>Composition</th><th>Term</th><th>Represents</th></tr>
<tr><td><b>President</b></td><td>Head of State</td><td>1, elected by Electoral College (MPs + MLAs)</td><td>5 years</td><td>Constitutional head — summons, signs bills, dissolves LS</td></tr>
<tr><td><b>Lok Sabha</b></td><td>Lower House / House of the People</td><td>543 directly elected + 2 nominated (discontinued)</td><td>5 years (unless dissolved)</td><td>Represents the PEOPLE of India directly</td></tr>
<tr><td><b>Rajya Sabha</b></td><td>Upper House / Council of States</td><td>245 (233 elected by state assemblies + 12 nominated by President)</td><td>Permanent body (1/3 retire every 2 years)</td><td>Represents the STATES of India</td></tr>
</table>
<h3>Lok Sabha — Powers and Functions</h3>
<ul>
<li><b>Money Bills (Article 110):</b> Can ONLY be introduced in Lok Sabha, not Rajya Sabha. Rajya Sabha can only suggest amendments (not reject) and must return within 14 days.</li>
<li><b>Council of Ministers:</b> The government is responsible to Lok Sabha. Prime Minister must command a majority in Lok Sabha. A vote of No-Confidence removes the entire cabinet.</li>
<li><b>Joint Sitting (Article 108):</b> In case of deadlock, a joint sitting is called. Lok Sabha's larger numbers (543 vs ~245) dominate the outcome.</li>
<li>Largest constituency by voters: Malkajgiri, Telangana (~3.7 million voters)</li>
</ul>
<h3>Rajya Sabha — Unique Powers</h3>
<ul>
<li><b>Cannot be dissolved</b> — ensures continuity of legislation during elections</li>
<li>VP of India is ex-officio Chairman; Deputy Chairman elected from members</li>
<li><b>Special Resolution (Article 249):</b> Can pass a resolution enabling Parliament to legislate on State List subjects</li>
<li><b>Article 312:</b> Can create new All India Services (like IAS, IPS)</li>
<li>States get RS seats proportional to population: UP (31), Maharashtra (19), Tamil Nadu (18)</li>
</ul>
<h3>How a Bill Becomes Law</h3>
<ol>
<li>Bill drafted by Ministry or private member; introduced in either house</li>
<li><b>First Reading:</b> Introduction, title read, published in Gazette</li>
<li><b>Second Reading:</b> General discussion + Committee stage (detailed clause-by-clause examination)</li>
<li><b>Third Reading:</b> Final vote on complete bill — passed by simple majority</li>
<li>Sent to other house — same 3-reading process</li>
<li>If both houses agree: sent to President</li>
<li>President: assents (becomes Act), returns with recommendations (Parliament can override by re-passing), or (for ordinary bills only) withholds assent (pocket veto)</li>
</ol>
<h3>Parliamentary Sessions</h3>
<table class="data-table">
<tr><th>Session</th><th>Months</th><th>Key Business</th></tr>
<tr><td>Budget Session</td><td>February – May</td><td>Annual Union Budget (February 1), Finance Bill, Appropriation Bill</td></tr>
<tr><td>Monsoon Session</td><td>July – August</td><td>General legislative business, question hour, private member bills</td></tr>
<tr><td>Winter Session</td><td>November – December</td><td>Legislative business, urgent matters, discussions</td></tr>
</table>`
},

{ id:'himalaya', cat:'india', icon:'⛰️', title:"Himalayan Formation — Plate Tectonics", sub:"How the world's highest mountains were created by colliding continents",
  body:`
<h3>The Indian Plate's Epic Journey</h3>
<p>About 180 million years ago, the supercontinent Pangaea broke apart. The Indian subcontinent was part of Gondwana (southern supercontinent). Over millions of years, the Indian tectonic plate drifted northward at geologically fast speeds (~15–20 cm/year during peak drift). The Tethys Sea separated India from Asia for over 100 million years.</p>
<h3>The Collision</h3>
<p>About 50–55 million years ago, the Indian Plate collided with the Eurasian Plate. Unlike oceanic-continental collisions (where the denser oceanic plate subducts), BOTH Indian and Eurasian plates were continental — too buoyant to subduct deeply. Instead, the crust <b>crumpled upward and thickened</b>, creating the Himalayas through continental collision orogeny. The collision has not stopped — it continues today.</p>
<h3>Why Marine Fossils Exist at High Altitude</h3>
<p>The Tethys Sea floor sediments (with marine fossils of ammonites, sea shells, coral) were pushed up to form the Himalayas. Marine fossils have been found at over 5,000 meters altitude in the Himalayas — direct evidence of tectonic collision. The same fossils that prove evolution also prove plate tectonics.</p>
<h3>Key Himalayan Facts</h3>
<table class="data-table">
<tr><th>Fact</th><th>Detail</th><th>Note</th></tr>
<tr><td>Collision began</td><td>~50–55 million years ago</td><td>India was moving at 15–20 cm/year before collision</td></tr>
<tr><td>Current convergence rate</td><td>~5 cm/year</td><td>India still moving north</td></tr>
<tr><td>Still rising</td><td>~5 mm/year</td><td>Faster than erosion → net height gain</td></tr>
<tr><td>Mt. Everest</td><td>8,848.86 m (2020 China-Nepal survey)</td><td>World's highest peak; Nepalese name: Sagarmatha; Tibetan: Chomolungma</td></tr>
<tr><td>K2</td><td>8,611 m</td><td>World's 2nd highest, in Karakoram Range</td></tr>
<tr><td>Himalayan length</td><td>~2,400 km</td><td>Kashmir to Arunachal Pradesh</td></tr>
<tr><td>Average elevation</td><td>~6,000 m</td><td>Highest mountain range on Earth</td></tr>
<tr><td>Number of peaks &gt;8000m</td><td>10 of world's 14</td><td>All "Eight-thousanders" in Himalaya/Karakoram</td></tr>
<tr><td>Rivers originating</td><td>Ganges, Indus, Brahmaputra, Yangtze</td><td>Provide water to ~3 billion people</td></tr>
</table>
<h3>Himalayan Effect on Indian Climate — The Monsoon</h3>
<ul>
<li><b>Block cold Central Asian winds:</b> Himalayas prevent freezing Siberian winds from entering India → India stays warm in winter</li>
<li><b>Monsoon mechanism:</b> Southwest monsoon winds carrying moisture from Indian Ocean hit the Himalayas → forced upward → cool → condense → heavy rainfall on southern slopes (India receives ~80% of rainfall in June–September)</li>
<li><b>Rain shadow:</b> Tibet and Gobi Desert are dry because Himalayas block moisture from reaching them</li>
<li><b>Seismic activity:</b> Ongoing tectonic collision creates frequent earthquakes in the Himalayan region (Nepal, Uttarakhand, Kashmir)</li>
</ul>`
},

{ id:'panama', cat:'india', icon:'🚢', title:"Panama Canal — Engineering Marvel", sub:"How ships cross between Atlantic and Pacific through Central America",
  body:`
<h3>Why the Panama Canal Was Built</h3>
<p>Before the canal, ships traveling from New York to San Francisco had to sail around <b>Cape Horn</b> (southern tip of South America) — a journey of ~22,000 km taking 67 days, through dangerous stormy seas. The Panama Canal cut this to ~9,500 km and 8–9 days, saving ~12,500 km per voyage. It is one of history's most impactful engineering projects.</p>
<h3>The Canal Route</h3>
<p>The canal is 82 km long, connecting the Caribbean Sea (Atlantic side) to the Gulf of Panama (Pacific side). Counterintuitively, the Pacific entrance is actually ~43 km east of the Caribbean entrance — due to Panama's S-shape. The highest point is Gatun Lake at 26 meters above sea level.</p>
<h3>The Lock System — How Ships Are Raised and Lowered</h3>
<p>The canal uses a series of water-filled chambers (locks) to raise ships 26 meters to Gatun Lake level and lower them back. No pumps are needed — water flows entirely by gravity from the higher lake into the locks. Gatun Lake (the world's largest man-made lake when built) is kept full by tropical rainfall.</p>
<ol>
<li>Ship enters first lock chamber; gates (massive steel miter gates) close behind</li>
<li>Water released from adjacent higher level — flows in by gravity, raising ship</li>
<li>When water levels equalize with next chamber, forward gates open, ship moves</li>
<li>Three locks on each side = raised/lowered 26 meters total</li>
<li>Ship transits 33km Gatun Lake at 26m elevation</li>
<li>Lowered back to sea level on Pacific side via Miraflores and Pedro Miguel locks</li>
</ol>
<div class="note"><strong>Water Usage:</strong> Each ship passage uses ~197 million liters of fresh water (all flows out to sea). The 2016 expansion added water-saving basins that recycle 60% of lock water.</div>
<h3>Key Canal Facts</h3>
<table class="data-table">
<tr><th>Fact</th><th>Data</th><th>Note</th></tr>
<tr><td>Construction started</td><td>1881 (France), 1904 (USA)</td><td>French attempt failed — yellow fever/malaria killed 22,000 workers</td></tr>
<tr><td>Opened</td><td>August 15, 1914</td><td>First ship: SS Ancon (US Army Corps)</td></tr>
<tr><td>Expanded (Neo-Panamax)</td><td>2016</td><td>New wider locks: 427m × 55m (original: 305m × 33.5m)</td></tr>
<tr><td>Canal length</td><td>82 km</td><td>Ships transit in 8–10 hours</td></tr>
<tr><td>Minimum depth</td><td>26.5 m</td><td>Accommodates deep-draft container ships</td></tr>
<tr><td>Ships per year</td><td>~14,000</td><td>~40 ships per day average</td></tr>
<tr><td>Toll per transit</td><td>$200,000–$500,000</td><td>Largest ships pay most</td></tr>
<tr><td>Revenue</td><td>~$3–4 billion/year</td><td>Panama's largest income source (~6% of GDP)</td></tr>
<tr><td>Ownership</td><td>Panama (since December 31, 1999)</td><td>Previously controlled by USA (1904–1979 treaty, managed until 1999)</td></tr>
<tr><td>World trade share</td><td>~5% of global maritime trade</td><td>~$270 billion of goods per year</td></tr>
</table>`
},

{ id:'mobius', cat:'india', icon:'♾️', title:"Möbius Strip & Klein Bottle — Topology", sub:"Mathematical surfaces with impossible properties",
  body:`
<h3>What is Topology?</h3>
<p>Topology is the branch of mathematics that studies properties of geometric objects preserved under <b>continuous deformations</b> — stretching, bending, twisting — but NOT tearing or gluing. In topology, a donut (torus) and a coffee mug are the SAME object (homeomorphic) because you can deform one into the other without tearing — both have exactly one "hole."</p>
<h3>The Möbius Strip</h3>
<p>Created by August Ferdinand Möbius (1858). Take a rectangular strip of paper, give it a <b>single half-twist (180°)</b>, and connect the ends. Result: a surface with only <b>ONE SIDE and ONE EDGE.</b></p>
<h4>Properties</h4>
<ul>
<li><b>ONE SIDE:</b> An ant walking along the center line will traverse BOTH "apparent" sides and return to its starting point without ever crossing an edge. Try tracing along a Möbius strip — you end up where you started having covered the entire surface!</li>
<li><b>ONE EDGE:</b> The boundary consists of a single continuous closed curve, not two separate edges.</li>
<li><b>Non-orientable:</b> Cannot consistently define "clockwise" throughout the surface. A clock traveling around the strip comes back as a mirror image.</li>
<li><b>Cut down the middle:</b> Instead of two separate rings, you get ONE longer ring with TWO full twists.</li>
<li><b>Cut 1/3 from edge:</b> Creates TWO linked loops — one Möbius strip (width 1/3) and one longer double-twisted loop (width 2/3).</li>
</ul>
<h4>Real Applications</h4>
<ul>
<li><b>Conveyor belts:</b> A half-twisted belt wears both "sides" equally, doubling its service life. B.F. Goodrich patented Möbius conveyor belts.</li>
<li><b>Recording tape:</b> Twisted loop uses both sides of magnetic tape before requiring replacement.</li>
<li><b>Electronic resistors:</b> Möbius strip resistors cancel out their own inductance — useful in precision measurement equipment.</li>
</ul>
<h3>Klein Bottle</h3>
<p>The 3D equivalent of a Möbius strip. A <b>closed surface with NO inside or outside, NO boundary, and NO volume</b>. Named after Felix Klein (1882). In 3D space, it MUST self-intersect (the tube passes through itself). It can only be properly embedded without self-intersection in <b>4-dimensional space</b>.</p>
<p>A Klein bottle can be constructed by gluing two Möbius strips along their single boundary edges. A Klein bottle immersed in 3D is a useful visualization, but mathematically it "really" exists only in 4D.</p>
<h3>Euler Characteristic and Topology</h3>
<div class="formula">Euler characteristic: χ = V - E + F
(Vertices - Edges + Faces)
Sphere: χ = 2  (a ball has no holes)
Torus (donut): χ = 0  (one hole)
Möbius strip: χ = 0  (one boundary component)
Klein bottle: χ = 0  (closed non-orientable surface)
These are topological invariants — unchanged by any continuous deformation</div>
<p><b>The Classification Theorem:</b> Every closed compact 2-manifold is either a connected sum of tori (orientable: sphere, torus, double torus...) or connected sum of projective planes (non-orientable: Klein bottle, projective plane...). Topology has completely classified all possible 2D surfaces.</p>`
},

// ════ MEDICAL & VEDIC ════
{ id:'mri', cat:'medical', icon:'🏥', title:"MRI Machine — Medical Imaging", sub:"How magnetic fields and radio waves create 3D images of your body",
  body:`
<h3>What is MRI?</h3>
<p>Magnetic Resonance Imaging (MRI) uses powerful magnetic fields and radio waves — <b>NO X-rays, NO ionizing radiation</b> — to create detailed 3D images of organs and soft tissues inside the body. Based on Nuclear Magnetic Resonance (NMR), discovered by Felix Bloch and Edward Purcell (Nobel Prize 1952).</p>
<h3>Step-by-Step: How MRI Works</h3>
<ol>
<li><b>ALIGNMENT:</b> Patient placed inside superconducting magnet (1.5–7 Tesla — 30,000–140,000× Earth's field). Hydrogen protons (¹H nuclei — abundant in water and fat in all body tissue) align parallel or antiparallel to the field, like tiny compass needles. A slight excess aligns parallel → net magnetization.</li>
<li><b>EXCITATION:</b> Short pulses of radiofrequency (RF) energy at the hydrogen Larmor frequency (63.9 MHz at 1.5T) are transmitted into the patient. Protons absorb this energy and are knocked out of alignment → they precess (wobble like spinning tops) at this exact frequency.</li>
<li><b>RELAXATION:</b> When RF pulse stops, protons gradually return to alignment (relax), emitting RF signals. Different tissues relax at different rates characterized by T1 (longitudinal) and T2 (transverse) time constants. Fat: short T1 (bright on T1 images). Water: long T1, long T2 (bright on T2 images). Pathology (tumors, edema) often has different T1/T2 than surrounding normal tissue.</li>
<li><b>SPATIAL ENCODING:</b> Gradient coils create three sets of spatially varying magnetic fields (Gx, Gy, Gz). These cause protons in different locations to precess at slightly different frequencies → their emitted RF signals encode position as frequency and phase.</li>
<li><b>RECONSTRUCTION:</b> Computer collects thousands of RF signals from different gradient combinations (k-space). A <b>Fourier Transform</b> converts the frequency/phase information into a 3D image with extraordinary tissue contrast.</li>
</ol>
<div class="formula">Larmor frequency: f₀ = γB₀/(2π)
γ (gyromagnetic ratio ¹H) = 2.675 × 10⁸ rad/s/T
At 1.5 T: f₀ = 63.9 MHz  (radio frequency band!)
At 3.0 T: f₀ = 127.7 MHz
At 7.0 T: f₀ = 297.9 MHz</div>
<h3>MRI vs Other Medical Imaging</h3>
<table class="data-table">
<tr><th>Modality</th><th>Technology</th><th>Radiation</th><th>Best For</th><th>Limitations</th></tr>
<tr><td><b>X-Ray</b></td><td>X-ray photons (ionizing)</td><td>Low dose</td><td>Bones, fractures, chest</td><td>Poor soft tissue contrast, radiation</td></tr>
<tr><td><b>CT Scan</b></td><td>Rotating X-ray + computer (ionizing)</td><td>Moderate</td><td>Bones, internal bleeding, chest, abdomen</td><td>High radiation, poor soft tissue vs MRI</td></tr>
<tr><td><b>Ultrasound</b></td><td>Sound waves (non-ionizing)</td><td>None</td><td>Fetus, heart, blood vessels</td><td>Poor for bone/air, operator-dependent</td></tr>
<tr><td><b>MRI</b></td><td>RF + magnetic field (non-ionizing)</td><td>None</td><td>Brain, spinal cord, joints, cancer</td><td>Expensive, slow (30–60 min), no metal implants</td></tr>
<tr><td><b>PET Scan</b></td><td>Positron-emitting tracers (ionizing)</td><td>Moderate</td><td>Metabolic activity — cancer staging, brain function</td><td>Radiation, expensive, need cyclotron for tracers</td></tr>
<tr><td><b>fMRI</b></td><td>MRI detecting blood oxygenation (BOLD signal)</td><td>None</td><td>Brain activity mapping in real-time</td><td>Indirect measure of neural activity</td></tr>
</table>
<h3>Types of MRI Scans</h3>
<ul>
<li><b>Brain MRI:</b> Detects tumors, stroke, MS plaques, Alzheimer's changes, trauma</li>
<li><b>Cardiac MRI:</b> Heart structure and function — more detailed than echocardiogram</li>
<li><b>Spine MRI:</b> Disc herniation, spinal cord compression, metastases</li>
<li><b>Knee/Joint MRI:</b> Ligament tears (ACL), meniscus damage, cartilage loss</li>
<li><b>MR Angiography:</b> Blood vessel imaging without contrast dye in many cases</li>
<li><b>Diffusion MRI:</b> Maps water molecule movement — traces nerve fiber pathways in brain (tractography)</li>
</ul>`
},

{ id:'neuro', cat:'medical', icon:'🧠', title:"Neuroscience — The Brain & Nervous System", sub:"How your brain processes information, controls your body, and creates consciousness",
  body:`
<h3>The Scale of the Brain</h3>
<ul>
<li>~86 billion neurons (nerve cells)</li>
<li>~86 billion glial cells (support, protection, nutrition)</li>
<li>~10¹⁴ (100 trillion) synaptic connections — more than there are stars in 1000 Milky Way galaxies</li>
<li>Total wiring length of all axons: ~150,000 km (4× around Earth)</li>
<li>Brain weight: ~1.4 kg (~2% of body weight)</li>
<li>Energy consumption: ~20 W (~20% of body's energy despite being 2% of weight)</li>
</ul>
<h3>Anatomy of a Neuron</h3>
<ul>
<li><b>Dendrites:</b> Branching input receivers — collect signals from other neurons</li>
<li><b>Cell Body (Soma):</b> Integrates incoming signals; contains nucleus and organelles</li>
<li><b>Axon:</b> Long output fiber — carries signal to next neuron (up to 1 meter for motor neurons to toes)</li>
<li><b>Myelin Sheath:</b> Fat insulation from Schwann cells (PNS) or oligodendrocytes (CNS). Increases conduction speed from 0.5 m/s to 120 m/s. Loss of myelin = Multiple Sclerosis.</li>
<li><b>Axon Terminals:</b> Release neurotransmitters into the synapse</li>
</ul>
<div class="formula">Resting membrane potential: ~−70 mV (inside negative)
Action potential threshold: ~−55 mV
Peak action potential: ~+40 mV
Duration: ~1–2 ms
Refractory period: ~1–4 ms (limits max firing rate to ~250–1000 Hz)
Signal propagation: 0.5 m/s (unmyelinated) to 120 m/s (myelinated)</div>
<h3>The Brain's Major Regions</h3>
<table class="data-table">
<tr><th>Region</th><th>Key Functions</th><th>Damage Effects</th></tr>
<tr><td><b>Frontal Lobe</b></td><td>Planning, decision-making, personality, impulse control, voluntary movement (motor cortex), speech production (Broca's area)</td><td>Personality change, poor judgment, Parkinson's disease (motor cortex)</td></tr>
<tr><td><b>Parietal Lobe</b></td><td>Somatosensory processing (touch, pain, temperature, proprioception), spatial awareness, reading</td><td>Loss of sensation, spatial disorientation, neglect syndrome (ignoring one side of body)</td></tr>
<tr><td><b>Temporal Lobe</b></td><td>Hearing (auditory cortex), language comprehension (Wernicke's area), long-term memory (hippocampus), face recognition</td><td>Hearing difficulty, amnesia (hippocampus damage → no new memories), language comprehension problems</td></tr>
<tr><td><b>Occipital Lobe</b></td><td>All visual processing — shape, color, motion, object recognition</td><td>Visual deficits/blindness even if eyes are functioning perfectly</td></tr>
<tr><td><b>Cerebellum</b></td><td>Motor coordination, balance, timing, fine motor skills, procedural learning</td><td>Ataxia (uncoordinated, jerky movement), balance problems, difficulty with timing tasks</td></tr>
<tr><td><b>Brainstem</b></td><td>Vital functions: breathing, heart rate, blood pressure, sleep/wake cycle, swallowing, eye movements</td><td>Can be fatal — brainstem stroke is a medical emergency</td></tr>
<tr><td><b>Hippocampus</b></td><td>Forming new long-term memories, spatial navigation (mental map of environment)</td><td>Anterograde amnesia (can't form new memories — the "50 First Dates" condition). Severely damaged in Alzheimer's.</td></tr>
<tr><td><b>Amygdala</b></td><td>Fear responses, emotional memory, detecting threats, social behavior</td><td>Inability to feel fear; poor threat detection; emotional dysregulation</td></tr>
<tr><td><b>Prefrontal Cortex</b></td><td>Executive function, abstract thinking, working memory, moral reasoning, social behavior</td><td>Personality changes; last brain region to fully develop (~age 25)</td></tr>
</table>
<h3>Key Neurotransmitters</h3>
<table class="data-table">
<tr><th>Neurotransmitter</th><th>Function</th><th>Clinical Relevance</th></tr>
<tr><td><b>Dopamine</b></td><td>Reward, motivation, movement, attention, learning</td><td>Deficit → Parkinson's disease, depression; Excess → schizophrenia; Targeted by cocaine, methamphetamine</td></tr>
<tr><td><b>Serotonin</b></td><td>Mood regulation, sleep, appetite, social behavior, pain modulation</td><td>Deficit → depression, anxiety; SSRI antidepressants (Prozac, Zoloft) increase serotonin availability</td></tr>
<tr><td><b>Acetylcholine</b></td><td>Muscle contraction, memory formation, attention, REM sleep</td><td>Deficit → Alzheimer's disease, myasthenia gravis; Nerve agents/organophosphates block acetylcholinesterase</td></tr>
<tr><td><b>Norepinephrine</b></td><td>Alertness, attention, fight-or-flight response, focus</td><td>Beta-blockers block NE receptors → lower blood pressure, reduce anxiety; Deficit → ADHD, depression</td></tr>
<tr><td><b>GABA</b></td><td>Main inhibitory neurotransmitter — calms neural activity, prevents overexcitation</td><td>Deficit → anxiety, seizures, insomnia; Benzodiazepines (Valium, Xanax) enhance GABA → calm/sedation</td></tr>
<tr><td><b>Glutamate</b></td><td>Main excitatory neurotransmitter — activates neurons, essential for learning and memory (LTP)</td><td>Excess → excitotoxicity (neurons die from over-activation — occurs in stroke, traumatic brain injury)</td></tr>
<tr><td><b>Endorphins</b></td><td>Natural pain relief, euphoria ("runner's high"), stress response</td><td>Opioid drugs (morphine, heroin) mimic endorphins at μ-opioid receptors; basis of opioid addiction</td></tr>
</table>`

<h3>India's Scientific Heritage</h3>
<p>India has one of the world's oldest and most sophisticated scientific traditions — spanning mathematics, astronomy, medicine, metallurgy, and linguistics. Many concepts considered "modern" were discovered or conceptualized in India centuries or millennia earlier.</p>
<h3>Mathematics</h3>
<table class="data-table">
<tr><th>Concept</th><th>Mathematician/Scholar</th><th>Source</th><th>Significance</th></tr>
<tr><td>Zero as a Number</td><td>Brahmagupta (7th century CE)</td><td>Brahmasphutasiddhanta (628 CE)</td><td>First to define zero with arithmetic rules: a + 0 = a, a × 0 = 0</td></tr>
<tr><td>Decimal Number System</td><td>Aryabhata, Brahmagupta (5th–7th century)</td><td>Aryabhatiya</td><td>Positional decimal notation — adopted by the world via Arab mathematicians (hence "Arabic numerals")</td></tr>
<tr><td>Pythagorean Theorem</td><td>Baudhayana (~800 BCE)</td><td>Baudhayana Sulba Sutra</td><td>"The diagonal of a rectangle produces both areas" — stated 300 years before Pythagoras (570 BCE)</td></tr>
<tr><td>Value of π</td><td>Aryabhata (499 CE)</td><td>Aryabhatiya</td><td>π ≈ 3.1416 (accurate to 4 decimal places) — among world's most accurate for that era</td></tr>
<tr><td>Trigonometry (Sine)</td><td>Aryabhata (499 CE)</td><td>Aryabhatiya</td><td>Defined jya (sine), kojya (cosine) — the world's first trigonometric functions</td></tr>
<tr><td>Negative Numbers</td><td>Brahmagupta (7th century)</td><td>Brahmasphutasiddhanta</td><td>Arithmetic rules for negative numbers; debt = negative assets</td></tr>
<tr><td>Binary Numbers</td><td>Pingala (~200 BCE)</td><td>Chandahshastra (prosody)</td><td>Binary representation in Sanskrit poetry meter analysis — 2300 years before Leibniz (1703)</td></tr>
<tr><td>Fibonacci Sequence</td><td>Virahanka (~600 CE), Hemachandra (~1150 CE)</td><td>Sanskrit prosody texts</td><td>Described in poetry meter analysis 400+ years before Fibonacci (1202)</td></tr>
<tr><td>Calculus concepts</td><td>Kerala School (14th–16th century)</td><td>Nilakantha, Madhava</td><td>Infinite series for π, sine, cosine — 200 years before Newton and Leibniz</td></tr>
</table>
<h3>Astronomy</h3>
<table class="data-table">
<tr><th>Discovery</th><th>Scholar</th><th>Content</th><th>Comparison</th></tr>
<tr><td>Earth rotates on its axis</td><td>Aryabhata (499 CE)</td><td>"The Earth rotates — not the stars"</td><td>~1000 years before Copernicus's heliocentric model (1543)</td></tr>
<tr><td>Age of Earth/Universe</td><td>Puranic texts</td><td>Kalpa = 4.32 billion years</td><td>Remarkably close to modern estimates (Earth: 4.54B years)</td></tr>
<tr><td>Solar year duration</td><td>Aryabhata</td><td>365.358 days</td><td>Accurate to within ~3 minutes of modern value (365.2564 days)</td></tr>
<tr><td>Eclipse explanation</td><td>Aryabhata</td><td>Shadow of Earth/Moon — not demons</td><td>Scientific explanation in 499 CE, centuries before European science</td></tr>
<tr><td>Gravitational concept</td><td>Brahmagupta (7th century)</td><td>"Objects fall to Earth due to attraction to Earth"</td><td>~1000 years before Newton's Principia (1687)</td></tr>
</table>
<h3>Medicine — Ayurveda, Sushruta & Charaka</h3>
<ul>
<li><b>Sushruta Samhita (~600 BCE):</b> Describes 300+ surgical procedures, 120+ surgical instruments, 1120 diseases. Sushruta performed rhinoplasty (nose reconstruction), cataract surgery, ear reconstruction, abdominal surgeries — forming the basis of modern plastic surgery.</li>
<li><b>Charaka Samhita (~400–200 BCE):</b> 8 branches of medicine, ~2,000 medicinal plants, immune system concept ("vyaadhikshamatva" — resistance to disease).</li>
<li><b>Sushruta's instruments:</b> Forceps (sandamshas), scalpels (mandalagra), scissors, bone saws — many equivalent to modern surgical tools</li>
</ul>
<h3>Vedic Mathematics — 16 Sutras</h3>
<p>Systematized by Bharati Krishna Tirthaji (1884–1960) from Vedic texts, these mental arithmetic techniques are taught in schools for speed calculations:</p>
<ul>
<li><b>Nikhilam:</b> Multiplication using complements of base numbers. Example: 97 × 98 = (97-2)(97×(-2)+(-3)×(-2)+100) → easier: 100-3, 100-2 → 97×98 = (97-2)(98)+(2×2)=9506. Fast!</li>
<li><b>Ekadhikena:</b> "By one more than the previous." Squaring numbers ending in 5: 65² = (6×7) | 25 = 4225. Always works!</li>
<li><b>Vertically and Crosswise:</b> General multiplication algorithm — works for any two numbers</li>
<li><b>Transpose and Apply:</b> For solving linear and quadratic equations mentally</li>
</ul>
<div class="note"><strong>India's Iron Pillar:</strong> The 7-meter-tall iron pillar in Delhi's Qutb Minar complex (cast ~400 CE) has barely rusted in 1,600 years. Modern analysis shows it contains high phosphorus (0.1–0.25%) and unusual microstructure creating a protective passivation layer — an ancient metallurgical achievement that scientists only recently understood.</div>`

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
let currentCat = null;
let allExpanded = false;

function buildNav() {
  const nav = document.getElementById('sideNav');
  let html = '<div class="section-label">Sections</div>';
  CATS.forEach(cat => {
    const count = TOPICS.filter(t => t.cat === cat.id).length;
    html += `<a class="nav-item" href="#" onclick="showCat('${cat.id}');return false;" id="nav-${cat.id}">
      <span class="ni-icon">${cat.emoji}</span>
      <span>${cat.label}</span>
      <span class="ni-count">${count}</span>
    </a>`;
  });
  nav.innerHTML = html;
}

function showCat(catId) {
  currentCat = catId;
  const cat = CATS.find(c => c.id === catId);
  const topics = TOPICS.filter(t => t.cat === catId);

  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${catId}`);
  if (navEl) navEl.classList.add('active');

  // Update topbar
  document.getElementById('topbarTitle').textContent = cat.emoji + '  ' + cat.label;
  document.getElementById('topbarSub').textContent = `${topics.length} topics in this section`;
  document.getElementById('topicCount').textContent = topics.length + ' topics';

  // Render
  const area = document.getElementById('contentArea');
  let html = `<div class="cat-banner" style="background:linear-gradient(135deg, ${cat.color}22, ${cat.bg});">
    <h2>${cat.emoji}  ${cat.label}</h2>
    <p>${topics.length} in-depth topics — click any card to expand</p>
  </div>`;
  topics.forEach((t, i) => {
    html += renderCard(t, cat.color, i);
  });
  area.innerHTML = html;

  document.getElementById('mainScroll').scrollTo({ top: 0, behavior: 'smooth' });
  allExpanded = false;
}

function renderCard(t, color, i) {
  return `<div class="topic-card" id="card-${t.id}">
    <div class="card-header" onclick="toggleCard('${t.id}')">
      <div class="card-icon" style="background:${color}22;font-size:1.3rem">${t.icon}</div>
      <div class="card-meta">
        <div class="card-title">${t.title}</div>
        <div class="card-sub" style="color:${color}">${t.sub}</div>
      </div>
      <button class="toggle-btn" id="btn-${t.id}">▼</button>
    </div>
    <div class="card-body" id="body-${t.id}">${t.body}</div>
  </div>`;
}

function toggleCard(id) {
  const body = document.getElementById(`body-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▼' : '▲';
  btn.style.color = isOpen ? '' : 'var(--accent)';
}

function toggleAll() {
  allExpanded = !allExpanded;
  const btn = document.querySelector('.expand-btn');
  document.querySelectorAll('.card-body').forEach(b => b.classList.toggle('open', allExpanded));
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.textContent = allExpanded ? '▲' : '▼';
    b.style.color = allExpanded ? 'var(--accent)' : '';
  });
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

function filterSide(q) {
  const query = q.toLowerCase();
  document.querySelectorAll('.nav-item').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = text.includes(query) ? '' : 'none';
  });
}

// Progress bar
document.getElementById('mainScroll').addEventListener('scroll', () => {
  const el = document.getElementById('mainScroll');
  const pct = (el.scrollTop / (el.scrollHeight - el.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
});

// Init
buildNav();

// Show welcome screen with all categories
const area = document.getElementById('contentArea');
area.innerHTML = `

        <div style="margin-top:0.8rem;font-size:0.73rem;color:${cat.color};">Explore →</div>
